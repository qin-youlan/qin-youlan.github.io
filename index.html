<html lang="zh"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懒得推荐</title>
    <!-- Font Awesome Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <img id="logo" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/code_assistant/18a7e2e93def4bc18951388518097afd~tplv-a9rns2rl98-image.image?rcl=202510182229058422D0EDAA6BB2B9E2B2&amp;rk3s=8e244e95&amp;rrcfp=e75484ac&amp;x-expires=1761402546&amp;x-signature=tkPdx6eL%2FYPvZRkv3i0T8L1ZVSY%3D" alt="Logo">
                <h1>懒得推荐</h1>
            </a>
        </div>
        <div class="search-container" style="width: 50%;">
            <input type="text" id="search-input" placeholder="搜索软件..." style="width: 100%;">
            <i class="fa fa-search search-icon"></i>
        </div>
    </header>

    <main>
        <section id="recommendations">
            <ul id="software-list">
                <!-- 软件磁贴将在这里动态生成 -->
            </ul>
        </section>
    </main>

    <script type="module">
        // 导入软件数据
        import { softwareList } from './data.js';
        
        // 使用软件数据中的图标URL
        const softwareData = softwareList.map((app, index) => {
            // 映射分类
            let category = 'tools';
            switch(app.category) {
                case '开发工具':
                    category = 'development';
                    break;
                case '网站':
                    category = 'website';
                    break;
                case '浏览器':
                    category = 'browser';
                    break;
                case '游戏辅助工具':
                    category = 'game-tools';
                    break;
                default:
                    category = 'tools';
            }
            
            return {
                id: index + 1,
                name: app.name,
                icon: app.icon, // 直接使用数据中的图标URL
                description: app.recommendText,
                category: category,
                url: app.url
            };
        });

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            renderSoftwareList(softwareData);
            setupEventListeners();
        });

        // 渲染软件列表
        function renderSoftwareList(software) {
            const softwareList = document.getElementById('software-list');
            
            // 清空列表
            softwareList.innerHTML = '';
            
            // 添加软件卡片
            software.forEach(app => {
                const li = document.createElement('li');
                li.className = 'software-tile';
                // 处理URL显示文本
                let displayUrl = '';
                if (app.url.startsWith('http')) {
                    // 对于外部链接，提取域名
                    displayUrl = new URL(app.url).hostname.replace('www.', '');
                } else {
                    // 对于内部链接，显示路径
                    displayUrl = app.url;
                }
                
                // 处理链接目标
                const target = app.url.startsWith('http') ? '_blank' : '_self';
                
                li.innerHTML = `
                    <a href="${app.url}" target="${target}" class="tile-link">
                        <div class="tile-content">
                            <div class="icon-container">
                                <img src="${app.icon}" alt="${app.name}">
                            </div>
                            <h3>${app.name}</h3>
                            ${app.name === '诸神工具' ? '' : `<p class="url-text">${displayUrl}</p>`}
                        </div>
                        <div class="tile-overlay">
                            <p class="overlay-text">${app.description}</p>
                            <span class="visit-btn">点击前往</span>
                        </div>
                    </a>
                `;
                softwareList.appendChild(li);
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 搜索功能
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', debounce(() => {
                const searchTerm = searchInput.value.toLowerCase().trim();
                
                if (searchTerm === '') {
                    renderSoftwareList(softwareData);
                    return;
                }
                
                const filteredSoftware = softwareData.filter(app => 
                    app.name.toLowerCase().includes(searchTerm) || 
                    app.description.toLowerCase().includes(searchTerm)
                );
                
                renderSoftwareList(filteredSoftware);
            }, 300));
        }
        
        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function() {
                const context = this;
                const args = arguments;
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    func.apply(context, args);
                }, wait);
            };
        }
    </script>


</body></html>
