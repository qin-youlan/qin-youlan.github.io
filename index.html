        // 2. 核心计算逻辑：保证最大奖励→筛选最小升级次数

            // 2.1 解析输入参数
            const { personGrowth, initLevel, selectedJobs, targetAttrIndex, maxAvailableLevelUp } = parseInputParams();
            const resultDom = document.getElementById("result-content");
            const verifyResultDom = document.getElementById("verify-result");
            // 参数验证

                resultDom.innerHTML = `<p class="highlight">参数错误：请确保六维格式正确、至少选择1个职业、初始等级≤89（可升≥1级）</p>`;
                verifyResultDom.textContent = "参数错误，无法验证";
                return;
            }
            // 2.2 遍历所有可能的升级次数（从1到最大可升级次数），记录每个次数的最优方案
            const levelPlanRecords = []; // 存储格式：{ upgradeCount: 升级次数, maxReward: 最大奖励, bestPlan: 最优组合, bestInject: 注入值, reward2: 第2奖励, reward3: 第3奖励, reward2Exact: 第2精确值, reward3Exact: 第3精确值 }
            for (let upgradeCount = 1; upgradeCount <= maxAvailableLevelUp; upgradeCount++) {
                // 生成当前升级次数的所有组合
                const levelCombinations = generateLevelCombinations(selectedJobs.length, upgradeCount);
                let currentMaxReward = -1;
                let currentBestPlan = null;
                let currentBestInject = null;
                let currentReward2 = 0;
                let currentReward3 = 0;
                let currentReward2Exact = 0;
                let currentReward3Exact = 0;
                // 遍历当前升级次数的所有组合
                levelCombinations.forEach(combination => {
                    // 计算注入值
                    const injectValues = new Array(6).fill(0);
                    combination.forEach((level, idx) => {
                        const job = selectedJobs[idx];
                        for (let i = 0; i < 6; i++) {
                            injectValues[i] += (personGrowth[i] + job.growth[i]) * level;
                        }
                    });
                    // 排序注入值（降序，保留索引）
                    const sortedInjects = [...injectValues].map((val, idx) => ({ val, idx }))
                        .sort((a, b) => b.val - a.val);
                    // 跳过目标属性非第一高的组合
                    if (sortedInjects[0].idx !== targetAttrIndex) return;
                    // 计算奖励（含精确值）
                    const S1 = sortedInjects[0].val;
                    const S2 = sortedInjects[1].val;
                    const S3 = sortedInjects[2].val;
                    const denominator = S1 + S2 + S3;
                    const reward2Exact = denominator === 0 ? 0 : (S2 / denominator) * 60;
                    const reward3Exact = denominator === 0 ? 0 : (S3 / denominator) * 60;
                    const reward2 = Math.floor(reward2Exact);
                    const reward3 = Math.floor(reward3Exact);
                    const reward1 = 60 - reward2 - reward3;
                    // 更新当前升级次数的最优方案
                    const targetInject = injectValues[targetAttrIndex];
                    const currentBestInjectVal = currentBestInject ? currentBestInject[targetAttrIndex] : 0;
                    if (reward1 > currentMaxReward || (reward1 === currentMaxReward && targetInject > currentBestInjectVal)) {
                        currentMaxReward = reward1;
                        currentBestPlan = combination;
                        currentBestInject = injectValues;
                        currentReward2 = reward2;
                        currentReward3 = reward3;
                        currentReward2Exact = reward2Exact;
                        currentReward3Exact = reward3Exact;
                    }
                });
                // 记录当前升级次数的有效方案（需存在有效组合）
                if (currentMaxReward > -1) {
                    levelPlanRecords.push({
                        upgradeCount,
                        maxReward: currentMaxReward,
                        bestPlan: currentBestPlan,
                        bestInject: currentBestInject,
                        reward2: currentReward2,
                        reward3: currentReward3,
                        reward2Exact: currentReward2Exact,
                        reward3Exact: currentReward3Exact
                    });
                }
            }
            // 2.3 筛选最优方案：先找全局最大奖励，再找最小升级次数
            if (levelPlanRecords.length === 0) {
                resultDom.innerHTML = `<p class="highlight">未找到有效方案（目标属性无法成为第一高）</p>`;
                verifyResultDom.textContent = "未找到有效方案，无法验证";
                return;
            }
            // 步骤1：找到全局最大奖励值
            const globalMaxReward = Math.max(...levelPlanRecords.map(plan => plan.maxReward));
            // 步骤2：筛选出所有能达到最大奖励的方案，按升级次数升序排序
            const maxRewardPlans = levelPlanRecords.filter(plan => plan.maxReward === globalMaxReward)
                .sort((a, b) => a.upgradeCount - b.upgradeCount);
            // 步骤3：选择升级次数最小的方案（第一个）
            const bestPlan = maxRewardPlans[0];
            // 2.4 解析最优方案数据
            const { upgradeCount: minUpgradeCount, bestPlan: minLevelCombination, bestInject: minLevelInjects, 
                    reward2, reward3, reward2Exact, reward3Exact } = bestPlan;
            const sortedInjects = [...minLevelInjects].map((val, idx) => ({ val, idx }))
                .sort((a, b) => b.val - a.val);
            const S1 = sortedInjects[0].val;
            const S2 = sortedInjects[1].val;
            const S3 = sortedInjects[2].val;
            const finalLevel = initLevel + minUpgradeCount;
            // 组装升级方案文本
            let combinationText = "";
            minLevelCombination.forEach((level, idx) => {
                if (level > 0) {
                    combinationText += `${level}级${selectedJobs[idx].name}、`;
                }
            });
            combinationText = combinationText.slice(0, -1) || "无升级（异常）";
            // 2.5 展示最优结果（标注最小升级次数）
            resultDom.innerHTML = `
                <div class="result-item"><strong>1. 核心结论：</strong>在保证目标属性奖励最大（${globalMaxReward}）的前提下，最小升级次数为${minUpgradeCount}次<span class="min-level-tag">最优</span></div>
                <div class="result-item"><strong>2. 等级路径：</strong>初始等级${initLevel} → 最终等级${finalLevel}（仅需升级${minUpgradeCount}级）</div>
                <div class="result-item"><strong>3. 最优转职方案：</strong>${combinationText}</div>
                <div class="result-item"><strong>4. 各属性注入值：</strong></div>
                <div class="result-item">${attrNames.map((name, i) => `${name}：${minLevelInjects[i].toFixed(4)}`).join(" | ")}</div>
                <div class="result-item"><strong>5. 前三高注入值：</strong></div>
                <div class="result-item">第1名：${attrNames[sortedInjects[0].idx]}（${S1.toFixed(4)}）| 第2名：${attrNames[sortedInjects[1].idx]}（${S2.toFixed(4)}）| 第3名：${attrNames[sortedInjects[2].idx]}（${S3.toFixed(4)}）</div>
                <div class="result-item"><strong>6. 最终奖励（含精确值）：</strong></div>
                <div class="result-item">目标属性（${attrNames[targetAttrIndex]}）奖励：<span class="highlight">${globalMaxReward}</span></div>
                <div class="result-item">第2名属性奖励：${reward2} <span class="exact-value">（精确值：${reward2Exact.toFixed(4)}）</span></div>
                <div class="result-item">第3名属性奖励：${reward3} <span class="exact-value">（精确值：${reward3Exact.toFixed(4)}）</span></div>
            `;
            // 2.6 验证特定案例（敏捷目标）
            verifyCase(personGrowth, selectedJobs, initLevel, targetAttrIndex, maxRewardPlans, verifyResultDom);
        }

        // 3. 辅助函数：解析输入参数
        function parseInputParams() {
            // 人物六维（范围-0.2~2）
            const growthStr = document.getElementById("person-growth").value.trim() || "0 0 0 0 0 0";
            const personGrowth = growthStr.split(/\s+/).map(num => {
                const val = parseFloat(num);
                return isNaN(val) ? 0 : Math.max(-0.2, Math.min(2, val));
            });
            // 初始等级（1~89），最大可升级次数=90-初始等级
            const initLevel = parseInt(document.getElementById("init-level").value) || 1;
            const maxAvailableLevelUp = Math.max(1, 90 - initLevel);
            // 可用职业
            const selectedJobIds = [];
            document.querySelectorAll("#job-checkboxes input[type='checkbox']:checked").forEach(checkbox => {
                selectedJobIds.push(checkbox.value);
            });
            const selectedJobs = allJobs.filter(job => selectedJobIds.includes(job.id));
            // 目标属性
            const targetAttrIndex = parseInt(document.getElementById("target-attr").value) || 0;
            return { personGrowth, initLevel, selectedJobs, targetAttrIndex, maxAvailableLevelUp };
        }

        // 4. 辅助函数：生成升级分配组合（n个非负整数和为sum）
        function generateLevelCombinations(n, sum) {
            const combinations = [];
            // 递归生成所有分配方式，兼容sum=1的场景
            function recursiveGenerate(current, remainingSum, depth) {
                if (depth === n - 1) {
                    combinations.push([...current, remainingSum]);
                    return;
                }
                for (let i = 0; i <= remainingSum; i++) {
                    current.push(i);
                    recursiveGenerate(current, remainingSum - i, depth + 1);
                    current.pop();
                }
            }
            recursiveGenerate([], sum, 0);
            return combinations;
        }

        // 5. 辅助函数：验证特定案例（敏捷目标）
        function verifyCase(personGrowth, selectedJobs, initLevel, targetAttrIndex, maxRewardPlans, verifyResultDom) {
            // 案例条件匹配：六维、职业、初始等级、目标属性
            const caseGrowth = [-0.1385, 0.0775, 0.3655, -0.0636, 0.0049, 0];
            const growthMatch = personGrowth.every((val, idx) => Math.abs(val - caseGrowth[idx]) < 0.0001);
            const jobIds = selectedJobs.map(job => job.id);
            const jobMatch = caseJobIds.every(id => jobIds.includes(id)) && jobIds.length === 3;
            const levelMatch = initLevel === 75;
            const targetMatch = targetAttrIndex === 2;
            if (!growthMatch || !jobMatch || !levelMatch || !targetMatch) {
                verifyResultDom.textContent = "当前输入参数与案例条件不符，无法验证";
                return;
            }
            // 案例预期：最大奖励为43，找到最小升级次数及对应方案
            const caseExpectedReward = 43;
            const casePlans = maxRewardPlans.filter(plan => plan.maxReward === caseExpectedReward);
            if (casePlans.length === 0) {
                verifyResultDom.innerHTML = `<span class="highlight">验证失败：未找到奖励为43的方案</span>`;
                return;
            }
            // 案例最小升级次数及方案
            const caseBestPlan = casePlans[0];
            const { upgradeCount: caseMinLevel, bestPlan: caseCombination } = caseBestPlan;
            // 解析案例组合（轻步兵、见习骑手、斥候的升级次数）
            let liLevel = 0, arLevel = 0, scLevel = 0;
            selectedJobs.forEach((job, idx) => {
                switch (job.id) {
                    case "light-infantry": liLevel = caseCombination[idx]; break;
                    case "apprentice-rider": arLevel = caseCombination[idx]; break;
                    case "scout": scLevel = caseCombination[idx]; break;
                }
            });
            // 输出案例验证结果
            verifyResultDom.innerHTML = `
                验证通过！<br>
                案例最大奖励：${caseExpectedReward} | 最小升级次数：${caseMinLevel}次<br>
                对应方案：${liLevel}级轻步兵 + ${arLevel}级见习骑手 + ${scLevel}级斥候<br>
                等级路径：75级 → ${75 + caseMinLevel}级（仅需升级${caseMinLevel}级）
            `;
        }
    </script>
