<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懒得工具 - 诸神皇冠工具</title>
    <!-- Font Awesome Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 基本页面样式 */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #333;
            color: #fff;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            color: #fff;
            padding: 10px 20px;
        }

        footer {
            background-color: #333 !important;
            color: #fff !important;
        }

        /* 工具列表样式 - 已修复宽度问题 */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
            list-style: none;
            margin: 0;
        }

        .software-tile {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

            .software-tile:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            }

        .tile-link {
            display: block;
            color: inherit;
            text-decoration: none;
            height: 100%;
        }

        .tile-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .icon-container img {
                width: 60px;
                height: 60px;
                object-fit: contain;
            }

        .tile-content h3 {
            margin: 0 0 10px;
            font-size: 1.2rem;
        }

        .category-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #ccc;
        }

        .tile-overlay {
            padding: 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
            position: relative;
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .software-tile:hover .tile-overlay {
            opacity: 1;
        }

        .overlay-text {
            margin: 0 0 10px;
            font-size: 0.9rem;
            color: #eee;
        }

        .visit-btn {
            background: #007bff;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: background 0.3s ease;
            align-self: flex-start;
        }

            .visit-btn:hover {
                background: #0056b3;
            }

        /* 搜索框样式 */
        .search-container {
            padding: 20px;
            text-align: center;
        }

        .search-input {
            padding: 10px 15px;
            width: 100%;
            max-width: 600px;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            outline: none;
        }

        /* 响应式调整 */
        @media (max-width: 1200px) {
            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 992px) {
            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .tool-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }
        }

        @media (max-width: 576px) {
            .tool-grid {
                grid-template-columns: 1fr;
                max-width: 300px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container" style="display: flex; align-items: center; width: 100%; justify-content: flex-end;">
            <a href="index.html" class="logo-link">
                <img id="logo" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/code_assistant/18a7e2e93def4bc18951388518097afd~tplv-a9rns2rl98-image.image?rcl=202510182229058422D0EDAA6BB2B9E2B2&amp;rk3s=8e244e95&amp;rrcfp=e75484ac&amp;x-expires=1761402546&amp;x-signature=tkPdx6eL%2FYPvZRkv3i0T8L1ZVSY%3D" alt="Logo">
                <h1>懒得工具</h1>
            </a>
        </div>
    </header>

    <main>
        <section class="tool-detail">
            <div class="container">
                <!-- 工具列表 - 已修复宽度问题 -->
                <div class="tool-content">
                    <ul id="software-list" class="tool-grid">
                        <!-- 工具列表将通过JavaScript动态生成 -->
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>秦又懒 © 2025</p>
    </footer>

    <script type="module">
        // 工具数据
        const toolList = [
            {
                name: '血脉',
                category: '游戏辅助工具',
                icon: '/icons/audrey.png',
                url: '/hx.html',
                description: '血脉极限属性'
            },
            {
                name: '传家宝',
                category: '游戏辅助工具',
                icon: '/icons/ring6.png',
                url: '/cjb.html',
                description: '传家宝极限方案'
            }
        ];

        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            renderToolList(toolList);

            // 添加搜索功能
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                const filteredTools = toolList.filter(tool =>
                    tool.name.toLowerCase().includes(searchTerm) ||
                    tool.description.toLowerCase().includes(searchTerm) ||
                    tool.category.toLowerCase().includes(searchTerm)
                );
                renderToolList(filteredTools);
            });
        });

        // 渲染工具列表
        function renderToolList(tools) {
            const toolListElement = document.getElementById('software-list');

            // 清空列表
            toolListElement.innerHTML = '';

            if (tools.length === 0) {
                const li = document.createElement('li');
                li.className = 'no-results';
                li.textContent = '没有找到匹配的工具';
                toolListElement.appendChild(li);
                return;
            }

            // 添加工具卡片
            tools.forEach(tool => {
                const li = document.createElement('li');
                li.className = 'software-tile';

                // 处理链接目标
                const target = tool.url.startsWith('http') ? '_blank' : '_self';

                li.innerHTML = `
                        <a href="${tool.url}" target="${target}" class="tile-link">
                            <div class="tile-content">
                                <div class="icon-container">
                                    <img src="${tool.icon}" alt="${tool.name}">
                                </div>
                                <h3>${tool.name}</h3>
                                <span class="category-tag">${tool.category}</span>
                            </div>
                            <div class="tile-overlay">
                                <p class="overlay-text">${tool.description}</p>
                                <span class="visit-btn">点击前往</span>
                            </div>
                        </a>
                    `;
                toolListElement.appendChild(li);
            });
        }
    </script>
</body>
</html>
