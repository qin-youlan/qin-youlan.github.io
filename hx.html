      radarSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      radarSvg.setAttribute('width', '100%');
      radarSvg.setAttribute('height', '100%');
      radarSvg.setAttribute('viewBox', '0 0 400 400');
      radarContainer.appendChild(radarSvg);
      // 六边形背景
      const hexPoints = radarConfig.map(item => {
        const x = radarCenterX + radarMaxRadius * Math.cos(item.angle);
        const y = radarCenterY - radarMaxRadius * Math.sin(item.angle);
        return `${x},${y}`;
      }).join(' ');
      const hexBg = createSvgElement('polygon', {
        points: hexPoints,
        stroke: 'rgba(255,255,255,0.8)',
        'stroke-width': '1',
        fill: 'none'
      });
      radarSvg.appendChild(hexBg);
      // 射线
      radarConfig.forEach(item => {
        const x = radarCenterX + radarMaxRadius * Math.cos(item.angle);
        const y = radarCenterY - radarMaxRadius * Math.sin(item.angle);
        const line = createSvgElement('line', {
          x1: radarCenterX,
          y1: radarCenterY,
          x2: x,
          y2: y,
          stroke: 'rgba(255,255,255,0.3)',
          'stroke-width': '0.5'
        });
        radarSvg.appendChild(line);
      });
    }
    // 11. SVG工具函数
    function createSvgElement(tag, attrs) {
      const elem = document.createElementNS('http://www.w3.org/2000/svg', tag);
      for (const key in attrs) elem.setAttribute(key, attrs[key]);
      return elem;
    }
    // 12. 数值映射函数
    function mapValueToPoint(value, angle) {
      let ratio = 0;
      const isOverMax = value > 1.5;
      if (value > 0 && value <= 1.5) ratio = value / 1.5;
      else if (isOverMax) ratio = 1;
      return {
        x: radarCenterX + radarMaxRadius * ratio * Math.cos(angle),
        y: radarCenterY - radarMaxRadius * ratio * Math.sin(angle),
        isOverMax
      };
    }
    // 13. 更新雷达图
    function updateSvgRadar(attributes) {
      if (!radarSvg) return;
      const oldDataLayers = radarSvg.querySelectorAll('.data-layer');
      oldDataLayers.forEach(layer => layer.remove());
      const pointData = radarConfig.map((item, index) => {
        const value = attributes[index];
        const { x, y, isOverMax } = mapValueToPoint(value, item.angle);
        return { x, y, isOverMax, name: item.name, value };
      });
      // 基础填充
      const baseFillPoints = pointData.map(p => `${p.x},${p.y}`).join(' ');
      const baseFill = createSvgElement('polygon', {
        points: baseFillPoints,
        fill: 'rgba(255, 215, 0, 0.6)',
        stroke: 'rgba(255, 215, 0, 1)',
        'stroke-width': '1',
        class: 'data-layer'
      });
      radarSvg.appendChild(baseFill);
      // 特殊填充
      const hasOverMax = pointData.some(p => p.isOverMax);
      if (hasOverMax) {
        const specialPoints = pointData.map(p => {
          const ratio = p.isOverMax ? 1/1.5 : 0.1/1.5;
          const x = radarCenterX + radarMaxRadius * ratio * Math.cos(radarConfig[pointData.indexOf(p)].angle);
          const y = radarCenterY - radarMaxRadius * ratio * Math.sin(radarConfig[pointData.indexOf(p)].angle);
          return `${x},${y}`;
        }).join(' ');
        const specialFill = createSvgElement('polygon', {
          points: specialPoints,
          fill: '#FFD700',
          stroke: 'rgba(255, 204, 0, 1)',
          'stroke-width': '1',
          class: 'data-layer'
        });
        radarSvg.appendChild(specialFill);
      }
      // 文本标签
      pointData.forEach(p => {
        const textX = radarCenterX + radarTextRadius * Math.cos(radarConfig[pointData.indexOf(p)].angle);
        const textY = radarCenterY - radarTextRadius * Math.sin(radarConfig[pointData.indexOf(p)].angle);
        const nameText = createSvgElement('text', { x: textX, y: textY - 5, class: 'radar-attr-text data-layer' });
        nameText.textContent = p.name;
        radarSvg.appendChild(nameText);
        const valueText = createSvgElement('text', { x: textX, y: textY + 15, class: 'radar-value-text data-layer' });
        valueText.textContent = p.value.toFixed(2);
        radarSvg.appendChild(valueText);
      });
    }
    // 14. 解析神血特性加成
    function getGodFeatureBonus() {
      const bonus = { "体": 0, "力": 0, "技": 0, "敏": 0, "感": 0, "意": 0 };
      const featureConfig = bloodlineGodFeatureMap[currentMainBloodline] || bloodlineGodFeatureMap["默认"];
      let other1Part = '';
      let other2Part = '';
      // 神子之技加成
      const skillName = godSkillSelect.value;
      if (skillName) {
        const skill = featureConfig.skills.find(s => s.name === skillName);
        if (skill?.growth) {
          for (const key in skill.growth) bonus[key] += skill.growth[key] || 0;
        }
      }
      // 神血特性1加成
      const other1Value = godOther1Select.value;
      if (other1Value) {
        const [name, part] = other1Value.split('-');
        other1Part = part;
        const feature = featureConfig.others.find(f => f.name === name);
        if (feature?.growth) {
          for (const key in feature.growth) bonus[key] += feature.growth[key] || 0;
        }
      }
      // 神血特性2加成
      const other2Value = godOther2Select.value;
      if (other2Value) {
        const [name, part] = other2Value.split('-');
        other2Part = part;
        const feature = featureConfig.others.find(f => f.name === name);
        if (feature?.growth) {
          for (const key in feature.growth) bonus[key] += feature.growth[key] || 0;
        }
      }
      // 检查部位重复并更新提示
      if (other1Part && other2Part) {
        if (other1Part === other2Part) {
          godFeatureError.innerHTML = `<i class="fa fa-exclamation-circle mr-1"></i> 神血特性部位不能重复，当前选择了两个"${other1Part}"部位，请选择不同部位的特性`;
          godFeatureError.classList.remove('hidden');
          return { bonus: { "体": 0, "力": 0, "技": 0, "敏": 0, "感": 0, "意": 0 }, error: true };
        } else {
          godFeatureError.innerHTML = `<i class="fa fa-info-circle mr-1"></i> 当前选择：神血特性1 ${other1Part}，神血特性2 ${other2Part}`;
          godFeatureError.classList.remove('hidden');
        }
      } else if (other1Part || other2Part) {
        // 当只选择了一个特性时
        const selectedPart = other1Part || other2Part;
        const selectedFeature = other1Part ? "神血特性1" : "神血特性2";
        godFeatureError.innerHTML = `<i class="fa fa-info-circle mr-1"></i> 当前选择：${selectedFeature} ${selectedPart}`;
        godFeatureError.classList.remove('hidden');
      } else {
        // 当没有选择任何特性时，隐藏提示
        godFeatureError.classList.add('hidden');
      }
      return { bonus, error: false };
    }
    // 15. 绑定事件
    function addEventListeners() {
      // 主血脉变化
      mainBloodlineSelect.addEventListener('change', function() {
        currentMainBloodline = this.value;
        updateGodFeatureOptions();
        calculateAttributes();
      });
      // 次血脉变化
      secondaryBloodlineSelect.addEventListener('change', function() {
        currentSecondaryBloodline = this.value;
        calculateAttributes();
      });
      // 百分比滑块
      percentageSlider.addEventListener('input', function() {
        currentMainPercentage = parseInt(this.value);
        currentSecondaryPercentage = 100 - currentMainPercentage;
        mainPercentageDisplay.textContent = `${currentMainPercentage}%`;
        secondaryPercentageDisplay.textContent = `${currentSecondaryPercentage}%`;
        secondaryBloodlineContainer.classList.toggle('hidden', currentMainPercentage === 100);
        calculateAttributes();
      });
      // 性别切换
      genderToggle.addEventListener('click', function() {
        currentGender = currentGender === '男' ? '女' : '男';
        this.classList.toggle('male', currentGender === '男');
        this.classList.toggle('female', currentGender === '女');
        this.innerHTML = `<span>${currentGender === '男' ? '♂' : '♀'}</span>`;
        calculateAttributes();
      });
      // 神像按钮
      paloBtn.addEventListener('click', () => toggleGodLevel('palo', paloBtn, paloLevelDisplay));
      konetaBtn.addEventListener('click', () => toggleGodLevel('koneta', konetaBtn, konetaLevelDisplay));
      sainanBtn.addEventListener('click', () => toggleGodLevel('sainan', sainanBtn, sainanLevelDisplay));
      // 神血特性变化
      godSkillSelect.addEventListener('change', calculateAttributes);
      godOther1Select.addEventListener('change', calculateAttributes);
      godOther2Select.addEventListener('change', calculateAttributes);
    }
    // 16. 切换神像等级
    function toggleGodLevel(god, button, levelDisplay) {
      currentGodLevels[god] = (currentGodLevels[god] + 1) % 3;
      button.classList.remove('level-0', 'level-1', 'level-2');
      button.classList.add(`level-${currentGodLevels[god]}`);
      levelDisplay.textContent = currentGodLevels[god];
      calculateAttributes();
    }
    // 17. 计算属性值
    function calculateAttributes() {
      // 血脉基础值
      const mainAttr = bloodlineAttributes[currentMainBloodline][currentGender];
      const secondaryAttr = currentSecondaryPercentage > 0 
        ? bloodlineAttributes[currentSecondaryBloodline][currentGender] 
        : { "体": 0, "力": 0, "技": 0, "敏": 0, "感": 0, "意": 0 };
      const base = {
        "体": mainAttr["体"]*(currentMainPercentage/100) + secondaryAttr["体"]*(currentSecondaryPercentage/100),
        "力": mainAttr["力"]*(currentMainPercentage/100) + secondaryAttr["力"]*(currentSecondaryPercentage/100),
        "技": mainAttr["技"]*(currentMainPercentage/100) + secondaryAttr["技"]*(currentSecondaryPercentage/100),
        "敏": mainAttr["敏"]*(currentMainPercentage/100) + secondaryAttr["敏"]*(currentSecondaryPercentage/100),
        "感": mainAttr["感"]*(currentMainPercentage/100) + secondaryAttr["感"]*(currentSecondaryPercentage/100),
        "意": mainAttr["意"]*(currentMainPercentage/100) + secondaryAttr["意"]*(currentSecondaryPercentage/100)
      };
      // 神像加成
      const godBonus = { "体": 0, "力": 0, "技": 0, "敏": 0, "感": 0, "意": 0 };
      for (const god in currentGodLevels) {
        const level = currentGodLevels[god];
        if (level > 0 && godBonuses[god][level]) {
          const b = godBonuses[god][level];
          godBonus["体"] += b["体"] || 0;
          godBonus["力"] += b["力"] || 0;
          godBonus["技"] += b["技"] || 0;
          godBonus["敏"] += b["敏"] || 0;
          godBonus["感"] += b["感"] || 0;
          godBonus["意"] += b["意"] || 0;
        }
      }
      // 神血特性加成
      const { bonus: featureBonus, error: featureError } = getGodFeatureBonus();
      // 最终值
      const final = {
        "体": base["体"] + godBonus["体"] + featureBonus["体"],
        "力": base["力"] + godBonus["力"] + featureBonus["力"],
        "技": base["技"] + godBonus["技"] + featureBonus["技"],
        "敏": base["敏"] + godBonus["敏"] + featureBonus["敏"],
        "感": base["感"] + godBonus["感"] + featureBonus["感"],
        "意": base["意"] + godBonus["意"] + featureBonus["意"]
      };
      const total = Object.values(final).reduce((sum, val) => sum + val, 0);
      // 更新显示
      bodyValueDisplay.textContent = final["体"].toFixed(2);
      strengthValueDisplay.textContent = final["力"].toFixed(2);
      skillValueDisplay.textContent = final["技"].toFixed(2);
      agilityValueDisplay.textContent = final["敏"].toFixed(2);
      perceptionValueDisplay.textContent = final["感"].toFixed(2);
      willValueDisplay.textContent = final["意"].toFixed(2);
      totalValueDisplay.textContent = total.toFixed(2);
      // 更新雷达图
      updateSvgRadar([final["感"], final["体"], final["力"], final["技"], final["敏"], final["意"]]);
    }
    // 18. 页面加载初始化
    document.addEventListener('DOMContentLoaded', initialize);
  </script>
