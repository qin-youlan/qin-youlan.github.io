<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>太阳之子发色识别</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { max-width: 800px; margin: 20px auto; font-family: Arial, sans-serif; text-align: center; padding: 0 15px; }
        h1 { color: #333; margin-bottom: 25px; font-size: 22px; }
        
        /* 模型加载区域 */
        #modelProgress { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            border: 1px solid #eee; 
        }
        .progress-title { color: #333; font-size: 15px; margin-bottom: 8px; }
        .progress-desc { color: #666; font-size: 13px; margin-bottom: 12px; line-height: 1.4; }
        .progress-bar { 
            width: 100%; 
            height: 8px; 
            background: #e9ecef; 
            border-radius: 4px; 
            overflow: hidden; 
            margin: 10px 0; 
        }
        .progress-fill { 
            height: 100%; 
            background: #3498db; 
            width: 0%; 
            transition: width 0.3s ease; 
        }
        .progress-status { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            color: #666; 
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #3498db; 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
            margin: 12px auto; 
            display: none; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { 
            color: #e74c3c; 
            font-size: 13px; 
            margin-top: 10px; 
            padding: 8px; 
            background: #fef0f0; 
            border-radius: 4px; 
            text-align: left; 
            display: none; 
        }
        .retry-btn { 
            margin-top: 10px; 
            padding: 6px 12px; 
            background: #3498db; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 13px; 
            display: none; 
        }
        .retry-btn:hover { background: #2980b9; }
        
        /* 功能区域 */
        #fileInput { 
            padding: 7px 10px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            margin-bottom: 15px; 
            cursor: pointer; 
            width: 90%; 
            max-width: 300px; 
        }
        .btn-group { margin-bottom: 15px; display: none; }
        .mode-btn { 
            padding: 7px 14px; 
            margin: 0 6px; 
            background: #3498db; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 13px; 
            transition: background 0.2s; 
        }
        .mode-btn:hover { background: #2980b9; }
        .mode-tip { color: #666; font-size: 13px; margin-bottom: 15px; }
        
        /* 图片区域 */
        #imageWrap { 
            position: relative; 
            max-width: 100%; 
            margin: 0 auto 15px; 
            border: 1px solid #eee; 
            border-radius: 6px; 
            padding: 8px; 
            background: #fff; 
        }
        #targetImg { 
            max-width: 100%; 
            border-radius: 4px; 
            display: none; 
            -webkit-touch-callout: none; 
            user-select: none; 
        }
        .face-mark { 
            position: absolute; 
            border: 2px solid #2ecc71; 
            background: rgba(46, 204, 113, 0.1); 
            cursor: pointer; 
            z-index: 10; 
        }
        .face-mark.active { 
            border-color: #e74c3c; 
            background: rgba(231, 76, 60, 0.2); 
        }
        .face-mark span { 
            position: absolute; 
            top: -22px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #2ecc71; 
            color: #fff; 
            font-size: 12px; 
            padding: 2px 6px; 
            border-radius: 3px; 
            white-space: nowrap; 
        }
        .select-box { 
            position: absolute; 
            border: 2px dashed #3498db; 
            background: rgba(52, 152, 219, 0.2); 
            display: none; 
            pointer-events: none; 
            z-index: 20; 
        }
        
        /* 结果区域 */
        #mainLoader { display: none; }
        #result { 
            font-size: 16px; 
            font-weight: bold; 
            color: #333; 
            min-height: 22px; 
            margin: 15px 0; 
        }
    </style>
</head>
<body>
    <h1>诸神皇冠 太阳之子发色识别</h1>

    <!-- 模型加载区域（含多节点切换提示） -->
    <div id="modelProgress">
        <div class="progress-title">模型加载中（多备用节点）</div>
        <div class="progress-desc">
            自动切换节点适配网络，首次加载约3-15秒，后续无需重新加载<br>
            加载进度：<span id="progressText">初始化连接...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-status">
            <span id="progressDetail">正在连接阿里云节点1...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="loader" id="modelLoader"></div>
        <div class="error" id="modelError">加载超时，自动切换节点重试中...</div>
        <button class="retry-btn" id="retryBtn">手动切换节点重试</button>
    </div>

    <!-- 功能区域 -->
    <input type="file" id="fileInput" accept="image/*" placeholder="选择图片">
    <div class="btn-group" id="btnGroup">
        <button class="mode-btn" id="autoBtn">自动识别模式</button>
        <button class="mode-btn" id="manualBtn">手动框选模式</button>
    </div>
    <p class="mode-tip" id="modeTip">当前：自动识别模式（上传图片后点击人脸分析）</p>

    <!-- 图片显示区域 -->
    <div id="imageWrap">
        <img id="targetImg" alt="上传图片后显示">
        <div class="select-box" id="selectBox"></div>
    </div>

    <!-- 结果区域 -->
    <div class="loader" id="mainLoader"></div>
    <div id="result"></div>

    <!-- 本地库文件引用（需与HTML同文件夹部署） -->
    <script src="./tf.min.js"></script>
    <script src="./face-api.min.js"></script>

    <script>
        // 状态管理：新增当前使用的CDN节点索引
        const state = {
            isManualMode: false,
            isSelecting: false,
            imgScale: 1,
            faceList: [],
            selectStartX: 0,
            selectStartY: 0,
            loadRetryCount: 0,
            maxRetryCount: 3, // 增加重试次数，适配多节点切换
            currentCdnIndex: 0 // 当前使用的CDN节点索引
        };

        // 核心优化：阿里云多备用CDN节点（含具体模型子路径，避免路径跳转）
        const cdnNodes = [
            {
                name: "阿里云节点1",
                tinyPath: "https://cdn.aliyuncs.com/@vladmandic/face-api/model/tiny_face_detector/",
                landmarkPath: "https://cdn.aliyuncs.com/@vladmandic/face-api/model/face_landmark_68/"
            },
            {
                name: "阿里云节点2",
                tinyPath: "https://cdn.aliyuncs.com/vladmandic/face-api/model/tiny_face_detector/",
                landmarkPath: "https://cdn.aliyuncs.com/vladmandic/face-api/model/face_landmark_68/"
            },
            {
                name: "阿里云节点3",
                tinyPath: "https://cdn.aliyuncs.com/tensorflow-face-api/model/tiny_face_detector/",
                landmarkPath: "https://cdn.aliyuncs.com/tensorflow-face-api/model/face_landmark_68/"
            }
        ];

        // DOM元素缓存
        const dom = {
            modelProgress: document.getElementById('modelProgress'),
            progressFill: document.getElementById('progressFill'),
            progressText: document.getElementById('progressText'),
            progressDetail: document.getElementById('progressDetail'),
            progressPercent: document.getElementById('progressPercent'),
            modelLoader: document.getElementById('modelLoader'),
            modelError: document.getElementById('modelError'),
            retryBtn: document.getElementById('retryBtn'),
            fileInput: document.getElementById('fileInput'),
            btnGroup: document.getElementById('btnGroup'),
            autoBtn: document.getElementById('autoBtn'),
            manualBtn: document.getElementById('manualBtn'),
            modeTip: document.getElementById('modeTip'),
            targetImg: document.getElementById('targetImg'),
            imageWrap: document.getElementById('imageWrap'),
            selectBox: document.getElementById('selectBox'),
            mainLoader: document.getElementById('mainLoader'),
            result: document.getElementById('result')
        };

        // 初始化：绑定重试按钮+启动加载
        init();
        function init() {
            // 禁用长按选图
            dom.targetImg.addEventListener('contextmenu', e => e.preventDefault());
            dom.targetImg.addEventListener('touchstart', e => {
                if (state.isManualMode) e.preventDefault();
            }, { passive: false });

            // 手动重试按钮：切换到下一个节点
            dom.retryBtn.addEventListener('click', () => {
                state.currentCdnIndex = (state.currentCdnIndex + 1) % cdnNodes.length;
                loadModel();
            });

            // 首次加载模型
            loadModel();
        }

        // 核心功能：多节点自动切换加载模型
        async function loadModel() {
            // 获取当前要使用的CDN节点
            const currentNode = cdnNodes[state.currentCdnIndex];
            // 重置加载状态
            dom.modelLoader.style.display = 'block';
            dom.modelError.style.display = 'none';
            dom.retryBtn.style.display = 'none';
            dom.progressFill.style.width = '0%';
            dom.progressPercent.textContent = '0%';
            dom.progressDetail.textContent = `正在连接${currentNode.name}...`;

            try {
                // 30秒超时限制
                const loadTimeout = new Promise((_, reject) => {
                    setTimeout(() => {
                        reject(new Error(`连接${currentNode.name}超时`));
                    }, 30000);
                });

                // 监听加载进度
                const updateProgress = (modelName, progress) => {
                    const percent = Math.round(progress * 100);
                    dom.progressFill.style.width = `${percent}%`;
                    dom.progressPercent.textContent = `${percent}%`;
                    dom.progressText.textContent = `加载${modelName}（${percent}%）`;
                    dom.progressDetail.textContent = `${currentNode.name}：${modelName}已加载${percent}%`;
                };

                // 加载当前节点的模型（使用具体子路径，避免根路径跳转）
                await Promise.race([
                    Promise.all([
                        // 人脸检测模型
                        faceapi.nets.tinyFaceDetector.load(currentNode.tinyPath, {
                            onProgress: (p) => updateProgress('人脸检测模型', p)
                        }),
                        // 人脸特征点模型
                        faceapi.nets.faceLandmark68Net.load(currentNode.landmarkPath, {
                            onProgress: (p) => updateProgress('人脸特征点模型', p)
                        })
                    ]),
                    loadTimeout
                ]);

                // 加载成功：隐藏加载区，显示功能按钮
                dom.modelProgress.style.display = 'none';
                dom.btnGroup.style.display = 'inline-block';
                bindAllEvents();
                state.loadRetryCount = 0; // 重置重试次数
            } catch (error) {
                // 加载失败：切换到下一个节点重试
                dom.modelLoader.style.display = 'none';
                dom.modelError.style.display = 'block';
                dom.modelError.textContent = `[${currentNode.name}]${error.message}，自动切换节点...`;
                dom.retryBtn.style.display = 'inline-block';
                dom.retryBtn.textContent = `手动切换到${cdnNodes[(state.currentCdnIndex+1)%cdnNodes.length].name}`;

                // 重试逻辑：未超过最大次数则自动切换节点
                state.loadRetryCount++;
                if (state.loadRetryCount < state.maxRetryCount) {
                    // 1秒后切换到下一个节点
                    setTimeout(() => {
                        state.currentCdnIndex = (state.currentCdnIndex + 1) % cdnNodes.length;
                        loadModel();
                    }, 1500);
                } else {
                    // 超过最大次数：提示手动重试
                    dom.modelError.textContent = '所有节点加载失败，请检查网络后点击"手动切换节点重试"';
                }

                // 绑定基础上传事件，至少能显示图片
                bindBasicUploadEvent();
            }
        }

        // 绑定所有交互事件
        function bindAllEvents() {
            bindBasicUploadEvent();
            bindModeSwitchEvent();
        }

        // 图片上传事件
        function bindBasicUploadEvent() {
            dom.fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file || !file.type.startsWith('image/')) {
                    dom.result.textContent = '请选择JPG、PNG格式的图片';
                    return;
                }

                // 重置状态
                state.faceList = [];
                clearFaceMarks();
                dom.targetImg.style.display = 'block';
                dom.mainLoader.style.display = 'block';
                dom.result.textContent = '正在处理图片...';

                // 显示图片
                const imgUrl = URL.createObjectURL(file);
                dom.targetImg.src = imgUrl;

                // 图片加载完成
                dom.targetImg.onload = () => {
                    state.imgScale = dom.targetImg.offsetWidth / dom.targetImg.naturalWidth;
                    dom.mainLoader.style.display = 'none';

                    if (!state.isManualMode) detectFaces();
                    else {
                        dom.result.textContent = '按住图片拖动，选择头发区域';
                        bindManualSelectEvents();
                    }
                };

                // 图片加载失败
                dom.targetImg.onerror = () => {
                    dom.mainLoader.style.display = 'none';
                    dom.targetImg.style.display = 'none';
                    dom.result.textContent = '图片加载失败，请重新上传';
                };
            });
        }

        // 自动/手动模式切换
        function bindModeSwitchEvent() {
            // 自动模式
            dom.autoBtn.addEventListener('click', () => {
                state.isManualMode = false;
                dom.modeTip.textContent = '当前：自动识别模式（上传图片后点击人脸分析）';
                dom.selectBox.style.display = 'none';
                clearFaceMarks();
                if (dom.targetImg.src) {
                    dom.mainLoader.style.display = 'block';
                    detectFaces().finally(() => dom.mainLoader.style.display = 'none');
                }
            });

            // 手动模式
            dom.manual
