<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳之眼-太阳之子识别-懒得工具</title>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <img id="logo" src="https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/code_assistant/18a7e2e93def4bc18951388518097afd~tplv-a9rns2rl98-image.image?rcl=202510182229058422D0EDAA6BB2B9E2B2&amp;rk3s=8e244e95&amp;rrcfp=e75484ac&amp;x-expires=1761402546&amp;x-signature=tkPdx6eL%2FYPvZRkv3i0T8L1ZVSY%3D" alt="Logo">
                <h1>懒得工具</h1>
            </a>
        </div>
    </header>

    <main>
        <section class="tool-detail">
            <h3 class="text-xl font-bold mb-4">太阳之子发色识别</h3>

            <div class="input-section">
                <div class="form-item">
                    <label class="upload-button" for="imageUpload">
                        <input type="file" id="imageUpload" accept="image/*">
                        <i class="fa fa-upload" aria-hidden="true"></i>
                        <span>上传图片</span>
                    </label>
                    <p class="upload-hint">(仅能识别头发，无法根据眉毛和胡须识别，请勿尝试)</p>
                </div>

                <div class="input-group">
                    <div class="form-item">
                        <div id="previewContainer">
                            <div id="positionWrapper">
                                <img id="previewImg" alt="图片预览">
                                <canvas id="detectionCanvas"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tip-text" id="mainTip">请先上传图片</div>
            </div>

            <div class="output-section mt-6">
                <div class="output-title">识别结果</div>
                <div class="result-content" id="finalResult">
                    <p>请上传图片并点击发色区域识别</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>秦又懒 © 2025</p>
    </footer>

    <style>
        /* 保持原有样式 */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #333;
            color: #fff;
        }

        header {
            display: flex;
            align-items: center;
            background-color: #333;
            padding: 10px 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        #logo {
            height: 2.2em;
            margin-right: 10px;
        }

        header h1 {
            margin: 0 0 0 15px;
            font-size: 1.5em;
        }

        main {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .tool-detail h3 {
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
        }

        .input-section {
            padding: 20px;
            background-color: #555;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        /* 上传按钮样式 */
        .upload-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            background-color: #ff9b37;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
            white-space: nowrap;
        }

            .upload-button:hover {
                background-color: #ff9b55;
            }

            .upload-button i {
                font-size: 18px;
            }

        /* 上传提示文字 */
        .upload-hint {
            color: #ccc;
            font-size: 14px;
            margin: 8px 0 0 0;
            text-align: center;
        }

        /* 确保按钮不超出容器 */
        .form-item {
            width: 100%;
            max-width: 800px;
            text-align: center; /* 按钮居中显示 */
        }

        #imageUpload {
            display: none;
        }
        .upload-area { 
            border: 2px dashed #3498db; 
            border-radius: 8px; 
            padding: 30px 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.3s; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            width: 100%;
            background-color: #444;
        }

        .upload-area:hover { 
            border-color: #ff9b37; 
            background: #4a4a4a; 
        }

        #imageUpload { display: none; }

        .upload-icon { 
            font-size: 40px; 
            color: #3498db; 
            margin-bottom: 15px; 
        }

        .upload-text { 
            color: #ccc; 
            font-size: 14px; 
            line-height: 1.5;
        }

        #previewContainer { 
            width: 100%; 
            border: 1px solid #666; 
            border-radius: 4px; 
            overflow: hidden; 
            background-color: #444; 
            min-height: 200px; 
            cursor: pointer;
        }

        #positionWrapper { 
            position: relative; 
            width: 100%; 
        }

        #previewImg { 
            width: 100%; 
            height: auto; 
            display: block; 
            opacity: 0; 
            transition: opacity 0.3s; 
        }

        #detectionCanvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
        }

        .tip-text { 
            color: #ccc; 
            font-size: 14px; 
            margin: 0 auto 20px; 
            text-align: center; 
            max-width: 800px;
        }

        .output-section {
            padding: 20px;
            border-radius: 8px;
            background-color: #555;
        }

        .output-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
        }

        .result-content {
            line-height: 1.8;
            color: #fff;
            font-size: 16px;
            padding: 15px;
            border-radius: 6px;
            min-height: 60px;
            text-align: center;
        }

        .result-sun { 
            background-color: #5a4a13; 
            color: #ffd700; 
            border: 1px solid #ffd70033; 
        }

        .result-not-sun { 
            background-color: #133a5a; 
            color: #87ceeb; 
            border: 1px solid #87ceeb33; 
        }

        .result-error { 
            background-color: #5a1313; 
            color: #ff6b6b; 
            border: 1px solid #ff6b6b33; 
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 0.8em;
        }
    </style>

    <script>
        // 核心优化：全局复用临时画布，避免重复创建
        const tempCanvas = document.createElement('canvas');
        const tempCtx = tempCanvas.getContext('2d');

        // 核心DOM元素
        const previewImg = document.getElementById('previewImg');
        const positionWrapper = document.getElementById('positionWrapper');
        const detectionCanvas = document.getElementById('detectionCanvas');
        const detectionCtx = detectionCanvas.getContext('2d');
        const mainTip = document.getElementById('mainTip');
        const finalResult = document.getElementById('finalResult');

        // 固定参数（保持不变）
        const T_PARAMS = {
            hMin: 40, hMax: 50,
            sMin: 35, sMax: 46,
            vMin: 5, vMax: 100
        };
        const JUDGE_RATIO = 0.21;

        // 全局变量
        let circleRadius = 20;
        let imgScaleRatio = 1;
        let originalImage = new Image();
        let isImageLoaded = false;
        let imageDataCache = null; // 缓存图片像素数据

        // 初始化
        function init() {
            document.getElementById('imageUpload').addEventListener('change', handleImageUpload);
            positionWrapper.addEventListener('click', handleClickDetect);
            window.addEventListener('load', resizeCanvas);
            window.addEventListener('resize', resizeCanvas);
        }

        // 调整画布尺寸
        function resizeCanvas() {
            if (!positionWrapper) return;
            const containerWidth = positionWrapper.clientWidth || 350;
            detectionCanvas.width = containerWidth;
            detectionCanvas.height = 200;
            circleRadius = Math.max(20, containerWidth / 20);
        }

        // 处理图片上传（优化：提前缓存像素数据）
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file || !file.type.match('image.*')) {
                alert('请选择有效的图片文件');
                updateResult('未上传有效图片', 'result-error');
                isImageLoaded = false;
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                originalImage.src = e.target.result;

                previewImg.onload = () => {
                    // 缓存原始图片像素数据，避免重复读取
                    tempCanvas.width = originalImage.width;
                    tempCanvas.height = originalImage.height;
                    tempCtx.drawImage(originalImage, 0, 0);
                    imageDataCache = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);

                    // 计算缩放比例
                    const containerWidth = positionWrapper.clientWidth || 350;
                    imgScaleRatio = containerWidth / previewImg.naturalWidth;
                    const scaledHeight = Math.max(200, previewImg.naturalHeight * imgScaleRatio);
                    
                    detectionCanvas.width = containerWidth;
                    detectionCanvas.height = scaledHeight;
                    circleRadius = Math.max(20, containerWidth / 20);

                    // 更新UI状态
                    previewImg.style.opacity = 1;
                    mainTip.textContent = '点击图片中的发色区域开始识别\n';
                    updateResult('已加载图片，请点击发色区域', 'result-error');
                    clearCanvas();
                    isImageLoaded = true;
                };

                previewImg.onerror = () => {
                    alert('图片加载失败，请更换图片');
                    previewImg.style.opacity = 0;
                    updateResult('图片加载失败', 'result-error');
                    isImageLoaded = false;
                };
            };
            reader.readAsDataURL(file);
        }

        // 点击识别（优化：使用requestIdleCallback避免阻塞UI）
        function handleClickDetect(e) {
            if (!isImageLoaded) {
                alert('请先上传并加载图片');
                return;
            }

            const rect = positionWrapper.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            
            // 先绘制识别圈，给用户即时反馈
            clearCanvas();
            drawDetectCircle(clickX, clickY);
            mainTip.textContent = '正在识别...';
            updateResult('识别中，请稍候', 'result-error');

            // 核心优化：在浏览器空闲时执行像素分析
            requestIdleCallback(() => {
                const { tPixel, fPixel } = countTFPixels(clickX, clickY);
                // 结果处理放回主线程
                requestAnimationFrame(() => {
                    judgeAndShowResult(tPixel, fPixel);
                });
            }, { timeout: 1000 }); // 最多等待1秒，避免超时无响应
        }

        // 统计像素（优化：减少遍历次数和计算量）
        function countTFPixels(centerX, centerY) {
            let tPixel = 0;
            let fPixel = 0;

            // 计算识别圈范围（整数化边界，减少小数计算）
            const radiusSquared = circleRadius * circleRadius;
            const minX = Math.max(0, Math.floor(centerX - circleRadius));
            const maxX = Math.min(detectionCanvas.width, Math.ceil(centerX + circleRadius));
            const minY = Math.max(0, Math.floor(centerY - circleRadius));
            const maxY = Math.min(detectionCanvas.height, Math.ceil(centerY + circleRadius));

            // 复用缓存的像素数据，避免重复绘制
            const { width: imgWidth, height: imgHeight } = imageDataCache;
            const pixels = imageDataCache.data;

            // 遍历像素（优化：减少循环内计算）
            for (let y = minY; y <= maxY; y++) {
                // 预计算Y方向偏移量
                const originalY = Math.round(y / imgScaleRatio);
                if (originalY < 0 || originalY >= imgHeight) continue;

                for (let x = minX; x <= maxX; x++) {
                    // 预计算X方向偏移量
                    const originalX = Math.round(x / imgScaleRatio);
                    if (originalX < 0 || originalX >= imgWidth) continue;

                    // 圆内判断（提前计算平方，减少乘法）
                    const dx = x - centerX;
                    const dy = y - centerY;
                    if (dx*dx + dy*dy > radiusSquared) continue;

                    // 从缓存中获取像素（优化：减少数组访问次数）
                    const pixelIndex = (originalY * imgWidth + originalX) * 4;
                    const r = pixels[pixelIndex];
                    const g = pixels[pixelIndex + 1];
                    const b = pixels[pixelIndex + 2];

                    // 优化HSV转换（简化计算，保留核心逻辑）
                    const { h, s, v } = fastRgbToHsv(r, g, b);

                    // 判断金色像素（F）
                    if (h >= 30 && h <= 65 && s >= 30 && s <= 100 && v >= 0 && v <= 100) {
                        fPixel++;
                        drawMaskPixel(x, y, 'rgba(255,0,0,0.4)');

                        // 判断目标像素（T）
                        if (h >= T_PARAMS.hMin && h <= T_PARAMS.hMax 
                            && s >= T_PARAMS.sMin && s <= T_PARAMS.sMax 
                            && v >= T_PARAMS.vMin && v <= T_PARAMS.vMax) {
                            tPixel++;
                            drawMaskPixel(x, y, 'rgba(255,255,255,0.5)');
                        }
                    }
                }
            }
            return { tPixel, fPixel };
        }

        // 快速HSV转换（优化：减少数学运算）
        function fastRgbToHsv(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h = 0, s = 0;
            const v = Math.round(max * 100); // 只保留V的百分比整数

            const delta = max - min;
            if (delta > 0) {
                // 简化H计算（只保留整数部分）
                if (max === r) {
                    h = ((g - b) / delta) % 6;
                } else if (max === g) {
                    h = (b - r) / delta + 2;
                } else {
                    h = (r - g) / delta + 4;
                }
                h = Math.round(h * 60);
                if (h < 0) h += 360;

                // 简化S计算
                s = Math.round((delta / max) * 100);
            }
            return { h, s, v };
        }

        // 其他辅助函数（保持不变）
        function drawMaskPixel(x, y, color) {
            detectionCtx.fillStyle = color;
            detectionCtx.fillRect(x, y, 1, 1);
        }

        function drawDetectCircle(x, y) {
            detectionCtx.beginPath();
            detectionCtx.arc(x, y, circleRadius, 0, Math.PI*2);
            detectionCtx.strokeStyle = '#ff9b37';
            detectionCtx.lineWidth = 2;
            detectionCtx.stroke();
        }

        function clearCanvas() {
            detectionCtx.clearRect(0, 0, detectionCanvas.width, detectionCanvas.height);
        }

        function updateResult(text, className) {
            finalResult.textContent = text;
            finalResult.className = `result-content ${className}`;
        }

        judgeAndShowResult = function(tPixel, fPixel) {
            mainTip.textContent = '识别完成，可点击其他区域重新识别';
            if (fPixel === 0) {
                updateResult('未识别到金色发色', 'result-error');
            } else {
                const ratio = tPixel / fPixel;
                updateResult(
                    ratio > JUDGE_RATIO ? '识别结果：太阳之子' : '识别结果：非太阳之子',
                    ratio > JUDGE_RATIO ? 'result-sun' : 'result-not-sun'
                );
            }
        }

        init();
    </script>
</body>
</html>
