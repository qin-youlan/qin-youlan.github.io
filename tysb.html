<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>太阳之子发色识别</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { max-width: 800px; margin: 20px auto; font-family: Arial, sans-serif; text-align: center; padding: 0 15px; }
        h1 { color: #333; margin-bottom: 25px; font-size: 22px; }
        
        /* 模型加载区域 */
        #modelProgress { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 6px; 
            margin-bottom: 20px; 
            border: 1px solid #eee; 
        }
        .progress-title { color: #333; font-size: 15px; margin-bottom: 8px; }
        .progress-desc { color: #666; font-size: 13px; margin-bottom: 12px; line-height: 1.4; }
        .progress-bar { 
            width: 100%; 
            height: 8px; 
            background: #e9ecef; 
            border-radius: 4px; 
            overflow: hidden; 
            margin: 10px 0; 
        }
        .progress-fill { 
            height: 100%; 
            background: #3498db; 
            width: 0%; 
            transition: width 0.3s ease; 
        }
        .progress-status { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            color: #666; 
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #3498db; 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
            margin: 12px auto; 
            display: none; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { 
            color: #e74c3c; 
            font-size: 13px; 
            margin-top: 10px; 
            padding: 8px; 
            background: #fef0f0; 
            border-radius: 4px; 
            text-align: left; 
            display: none; 
        }
        .retry-btn { 
            margin-top: 10px; 
            padding: 6px 12px; 
            background: #3498db; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 13px; 
            display: none; 
        }
        .retry-btn:hover { background: #2980b9; }
        
        /* 功能区域 */
        #fileInput { 
            padding: 7px 10px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            margin-bottom: 15px; 
            cursor: pointer; 
            width: 90%; 
            max-width: 300px; 
        }
        .btn-group { margin-bottom: 15px; display: none; }
        .mode-btn { 
            padding: 7px 14px; 
            margin: 0 6px; 
            background: #3498db; 
            color: #fff; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 13px; 
            transition: background 0.2s; 
        }
        .mode-btn:hover { background: #2980b9; }
        .mode-tip { color: #666; font-size: 13px; margin-bottom: 15px; }
        
        /* 图片区域 */
        #imageWrap { 
            position: relative; 
            max-width: 100%; 
            margin: 0 auto 15px; 
            border: 1px solid #eee; 
            border-radius: 6px; 
            padding: 8px; 
            background: #fff; 
        }
        #targetImg { 
            max-width: 100%; 
            border-radius: 4px; 
            display: none; 
            -webkit-touch-callout: none; 
            user-select: none; 
        }
        .face-mark { 
            position: absolute; 
            border: 2px solid #2ecc71; 
            background: rgba(46, 204, 113, 0.1); 
            cursor: pointer; 
            z-index: 10; 
        }
        .face-mark.active { 
            border-color: #e74c3c; 
            background: rgba(231, 76, 60, 0.2); 
        }
        .face-mark span { 
            position: absolute; 
            top: -22px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: #2ecc71; 
            color: #fff; 
            font-size: 12px; 
            padding: 2px 6px; 
            border-radius: 3px; 
            white-space: nowrap; 
        }
        .select-box { 
            position: absolute; 
            border: 2px dashed #3498db; 
            background: rgba(52, 152, 219, 0.2); 
            display: none; 
            pointer-events: none; 
            z-index: 20; 
        }
        
        /* 结果区域 */
        #mainLoader { display: none; }
        #result { 
            font-size: 16px; 
            font-weight: bold; 
            color: #333; 
            min-height: 22px; 
            margin: 15px 0; 
        }
    </style>
</head>
<body>
    <h1>诸神皇冠 太阳之子发色识别</h1>

    <!-- 模型加载区域（含超时重试） -->
    <div id="modelProgress">
        <div class="progress-title">模型加载中</div>
        <div class="progress-desc">
            首次加载约5-25秒（WiFi更快），后续打开无需重新加载<br>
            加载进度：<span id="progressText">初始化连接...</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-status">
            <span id="progressDetail">正在连接模型服务器...</span>
            <span id="progressPercent">0%</span>
        </div>
        <div class="loader" id="modelLoader"></div>
        <div class="error" id="modelError">加载超时，请检查网络后重试</div>
        <button class="retry-btn" id="retryBtn">重新加载模型</button>
    </div>

    <!-- 功能区域 -->
    <input type="file" id="fileInput" accept="image/*" placeholder="选择图片">
    <div class="btn-group" id="btnGroup">
        <button class="mode-btn" id="autoBtn">自动识别模式</button>
        <button class="mode-btn" id="manualBtn">手动框选模式</button>
    </div>
    <p class="mode-tip" id="modeTip">当前：自动识别模式（上传图片后点击人脸分析）</p>

    <!-- 图片显示区域 -->
    <div id="imageWrap">
        <img id="targetImg" alt="上传图片后显示">
        <div class="select-box" id="selectBox"></div>
    </div>

    <!-- 结果区域 -->
    <div class="loader" id="mainLoader"></div>
    <div id="result"></div>

    <!-- 关键：调用本地库文件（与HTML同文件夹） -->
    <script src="./tf.min.js"></script>
    <script src="./face-api.min.js"></script>

    <script>
        // 状态管理
        const state = {
            isManualMode: false,
            isSelecting: false,
            imgScale: 1,
            faceList: [],
            selectStartX: 0,
            selectStartY: 0,
            loadRetryCount: 0, // 加载重试次数
            maxRetryCount: 2   // 最大重试次数
        };

        // DOM元素缓存
        const dom = {
            // 模型加载相关
            modelProgress: document.getElementById('modelProgress'),
            progressFill: document.getElementById('progressFill'),
            progressText: document.getElementById('progressText'),
            progressDetail: document.getElementById('progressDetail'),
            progressPercent: document.getElementById('progressPercent'),
            modelLoader: document.getElementById('modelLoader'),
            modelError: document.getElementById('modelError'),
            retryBtn: document.getElementById('retryBtn'),
            // 功能相关
            fileInput: document.getElementById('fileInput'),
            btnGroup: document.getElementById('btnGroup'),
            autoBtn: document.getElementById('autoBtn'),
            manualBtn: document.getElementById('manualBtn'),
            modeTip: document.getElementById('modeTip'),
            targetImg: document.getElementById('targetImg'),
            imageWrap: document.getElementById('imageWrap'),
            selectBox: document.getElementById('selectBox'),
            mainLoader: document.getElementById('mainLoader'),
            result: document.getElementById('result')
        };

        // 初始化：加载模型（含超时重试）
        init();
        function init() {
            // 禁用长按选图
            dom.targetImg.addEventListener('contextmenu', e => e.preventDefault());
            dom.targetImg.addEventListener('touchstart', e => {
                if (state.isManualMode) e.preventDefault();
            }, { passive: false });

            // 绑定重试按钮事件
            dom.retryBtn.addEventListener('click', () => loadModel());

            // 首次加载模型
            loadModel();
        }

        // 加载模型（调用本地库，模型从CDN获取）
        async function loadModel() {
            // 重置加载状态
            dom.modelLoader.style.display = 'block';
            dom.modelError.style.display = 'none';
            dom.retryBtn.style.display = 'none';
            dom.progressFill.style.width = '0%';
            dom.progressPercent.textContent = '0%';
            dom.progressDetail.textContent = state.loadRetryCount > 0 
                ? `第${state.loadRetryCount+1}次重试加载...` 
                : '正在连接模型服务器...';

            try {
                // 设置30秒加载超时
                const loadTimeout = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error('加载超时（超过30秒）')), 30000);
                });

                // 监听模型加载进度
                const updateProgress = (modelName, progress) => {
                    const percent = Math.round(progress * 100);
                    dom.progressFill.style.width = `${percent}%`;
                    dom.progressPercent.textContent = `${percent}%`;
                    dom.progressText.textContent = `加载${modelName}（${percent}%）`;
                    dom.progressDetail.textContent = `${modelName}已加载${percent}%`;
                };

                // 并行加载CDN模型（本地库已加载，直接调用库功能）
                await Promise.race([
                    Promise.all([
                        // 人脸检测模型（CDN）
                        faceapi.nets.tinyFaceDetector.load(
                            'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/',
                            { onProgress: (p) => updateProgress('人脸检测模型', p) }
                        ),
                        // 人脸特征点模型（CDN）
                        faceapi.nets.faceLandmark68Net.load(
                            'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/',
                            { onProgress: (p) => updateProgress('人脸特征点模型', p) }
                        )
                    ]),
                    loadTimeout
                ]);

                // 模型加载成功：显示功能按钮
                dom.modelProgress.style.display = 'none';
                dom.btnGroup.style.display = 'inline-block';
                bindAllEvents();
                state.loadRetryCount = 0;
            } catch (error) {
                // 加载失败处理
                dom.modelLoader.style.display = 'none';
                dom.modelError.style.display = 'block';
                dom.modelError.textContent = `加载失败：${error.message}（建议切换WiFi重试）`;
                
                // 重试逻辑
                if (state.loadRetryCount < state.maxRetryCount) {
                    dom.retryBtn.style.display = 'inline-block';
                    state.loadRetryCount++;
                } else {
                    dom.retryBtn.style.display = 'none';
                    dom.modelError.textContent += '（已超过最大重试次数，请稍后再试）';
                }

                // 绑定基础上传事件，至少能显示图片
                bindBasicUploadEvent();
            }
        }

        // 绑定所有交互事件
        function bindAllEvents() {
            bindBasicUploadEvent();
            bindModeSwitchEvent();
        }

        // 图片上传事件
        function bindBasicUploadEvent() {
            dom.fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                // 验证图片格式
                if (!file || !file.type.startsWith('image/')) {
                    dom.result.textContent = '请选择JPG、PNG格式的图片';
                    return;
                }

                // 重置状态
                state.faceList = [];
                clearFaceMarks();
                dom.targetImg.style.display = 'block';
                dom.mainLoader.style.display = 'block';
                dom.result.textContent = '正在处理图片...';

                // 显示图片
                const imgUrl = URL.createObjectURL(file);
                dom.targetImg.src = imgUrl;

                // 图片加载完成后处理
                dom.targetImg.onload = () => {
                    state.imgScale = dom.targetImg.offsetWidth / dom.targetImg.naturalWidth;
                    dom.mainLoader.style.display = 'none';

                    // 自动模式识别人脸，手动模式提示框选
                    if (!state.isManualMode) {
                        detectFaces();
                    } else {
                        dom.result.textContent = '按住图片拖动，选择头发区域';
                        bindManualSelectEvents();
                    }
                };

                // 图片加载失败处理
                dom.targetImg.onerror = () => {
                    dom.mainLoader.style.display = 'none';
                    dom.targetImg.style.display = 'none';
                    dom.result.textContent = '图片加载失败，请重新上传';
                };
            });
        }

        // 自动/手动模式切换
        function bindModeSwitchEvent() {
            // 切换到自动模式
            dom.autoBtn.addEventListener('click', () => {
                state.isManualMode = false;
                dom.modeTip.textContent = '当前：自动识别模式（上传图片后点击人脸分析）';
                dom.selectBox.style.display = 'none';
                clearFaceMarks();
                // 已有图片则重新识别人脸
                if (dom.targetImg.src) {
                    dom.mainLoader.style.display = 'block';
                    detectFaces().finally(() => dom.mainLoader.style.display = 'none');
                }
            });

            // 切换到手动模式
            dom.manualBtn.addEventListener('click', () => {
                state.isManualMode = true;
                dom.modeTip.textContent = '当前：手动框选模式（按住图片拖动选择头发区域）';
                clearFaceMarks();
                bindManualSelectEvents();
                // 已有图片则提示框选
                if (dom.targetImg.src) {
                    dom.result.textContent = '按住图片拖动，选择头发区域';
                }
            });
        }

        // 自动识别人脸（适配二次元）
        async function detectFaces() {
            try {
                dom.result.textContent = '正在识别人脸...';
                // 二次元人脸优化参数（降低阈值避免漏检）
                const detectOptions = new faceapi.TinyFaceDetectorOptions({
                    inputSize: 640,
                    scoreThreshold: 0.3
                });

                // 检测人脸+提取68个特征点（调用本地库功能）
                const faceResult = await faceapi.detectAllFaces(dom.targetImg, detectOptions)
                    .withFaceLandmarks();

                // 无人脸处理
                if (faceResult.length === 0) {
                    dom.result.textContent = '未检测到人脸，请上传更清晰的二次元头像';
                    return;
                }

                // 保存人脸列表并绘制标记框
                state.faceList = faceResult;
                drawFaceMarks();
                dom.result.textContent = `检测到${faceResult.length}个人脸，点击标记框分析发色`;
            } catch (error) {
                dom.result
